<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – Holidays Your Way</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Nunito:wght@300;400;600;700&family=Poppins:wght@500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --hyw-blue: #0A3161;
      --hyw-blue-dark: #07203F;
      --hyw-red-dark: #8A102F;
      --hyw-white: #FFFFFF;
      --hyw-text: #1F2430;
      --hyw-grey: #f7f7f7;
    }

    body {
      margin: 0;
      font-family: "Nunito", sans-serif;
      color: var(--hyw-text);
      background-color: var(--hyw-white);
    }

    h1, h2, h3 {
      font-family: "Playfair Display", serif;
    }

    /* NAVBAR */
    .hyw-nav {
      background-color: var(--hyw-white);
      border-bottom: 1px solid #e3e6ee;
      padding: 0.4rem 0;
    }

    .hyw-logo {
      height: 180px;
      width: auto;
    }

    @media (max-width: 991.98px) { .hyw-logo { height: 140px; } }
    @media (max-width: 575.98px) { .hyw-logo { height: 90px; } }

    .navbar-nav .nav-link {
      font-weight: 600;
      font-size: 0.9rem;
      color: #394155;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .navbar-nav .nav-link:hover,
    .navbar-nav .nav-link.active {
      color: var(--hyw-blue);
    }

    /* HERO */
    .hyw-hero {
      width: 100%;
      height: 420px;
      background-image: url("images/plane-window.jpg");
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }

    .hyw-hero h1 {
      font-size: 3rem;
      color: var(--hyw-white);
      font-weight: 800;
      text-shadow: 0 4px 12px rgba(0,0,0,0.45);
    }

    .hyw-hero p {
      font-family: "Caveat", cursive;
      font-size: 1.9rem;
      color: var(--hyw-white);
      margin-top: 0.6rem;
      text-shadow: 0 3px 10px rgba(0,0,0,0.45);
    }

    /* CONTACT SECTION */
    .contact-section {
      padding: 4rem 0;
    }

    .contact-box {
      background: var(--hyw-grey);
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 25px;
      border-left: 6px solid var(--hyw-blue);
    }

    .contact-box h3 {
      font-size: 1.6rem;
      color: var(--hyw-blue-dark);
      margin-bottom: 0.6rem;
    }

    .contact-box p {
      font-size: 1rem;
      color: #4a5264;
      margin-bottom: 0.4rem;
    }

    .btn-hyw-blue {
      background-color: var(--hyw-blue) !important;
      color: #FFFFFF !important;
      border-radius: 999px;
      padding: 0.85rem 1.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    /* FOOTER */
    .hyw-footer {
      background-color: #050816;
      color: #cfd3e3;
      padding: 1.5rem 0;
      text-align: center;
      font-size: 0.85rem;
    }
  </style>
</head>

<body class="contact-page">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg hyw-nav">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="images/holidays-your-way-logo.png" alt="Holidays Your Way" class="hyw-logo" />
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#hywNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="hywNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="orlando.html">Orlando</a></li>
          <li class="nav-item"><a class="nav-link" href="destinations.html">Worldwide</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">What We Offer</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hyw-hero">
    <div>
      <h1>Let’s Plan Something Amazing</h1>
      <p>Tell me what you’re dreaming of.</p>
    </div>
  </section>

  <!-- CONTACT OPTIONS -->
  <section class="contact-section">
    <div class="container">

      <div class="contact-box">
        <h3>Email</h3>
        <p>alison@holidaysyourway.co.uk</p>
      </div>

      <div class="contact-box">
        <h3>WhatsApp</h3>
        <p>+44 7479 915608</p>
      </div>

      <div class="contact-box">
        <h3>Phone</h3>
        <p>01253 364710</p>
      </div>

      <div class="text-center mt-4">
        <a href="contact.html" class="btn btn-hyw-blue">Tell Me About Your Trip</a>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="hyw-footer">
    <div class="container">
      <p class="mb-0">© 2024 Holidays Your Way. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
